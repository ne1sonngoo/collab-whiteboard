# nginx.conf
# Nginx configuration for serving the built React app.
# This file is COPY'd into the Docker image at build time.
#
# Two location blocks:
#   1. Static assets (JS/CSS/images) — served with long cache headers since
#      Vite hashes filenames on every build, making them safe to cache forever
#   2. Everything else — falls back to index.html so React Router's
#      client-side navigation works for any URL the user visits directly

server {
    # Listen on port 80 (standard HTTP)
    listen 80;
    server_name _;

    # Root directory where the Vite build output was copied
    root /app/client/dist;
    index index.html;

    # Static assets — Vite hashes these filenames so they're safe to cache for 1 year
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # All other routes — return index.html so React Router handles navigation
    location / {
        try_files $uri $uri/ /index.html;
    }
}